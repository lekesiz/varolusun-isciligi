name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm exec vite build --base=/varolusun-isciligi/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
